<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设备巡检管理系统</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css">
    <script src="https://cdn.jsdelivr.net/npm/element-plus"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 220px; background: #001529; color: #fff; padding: 20px 0; }
        .sidebar h2 { text-align: center; padding: 0 20px 20px; border-bottom: 1px solid #1f3a57; margin-bottom: 10px; font-size: 18px; }
        .sidebar .menu-item { display: block; padding: 12px 24px; color: #fff; text-decoration: none; cursor: pointer; transition: all 0.3s; }
        .sidebar .menu-item:hover, .sidebar .menu-item.active { background: #1890ff; }
        .main-content { flex: 1; padding: 20px; overflow-y: auto; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .page-header h1 { font-size: 24px; color: #333; }
        .card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: #fff; border-radius: 8px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center; }
        .stat-card .number { font-size: 36px; font-weight: bold; color: #1890ff; margin-bottom: 8px; }
        .stat-card .label { color: #666; font-size: 14px; }
        .stat-card.warning .number { color: #faad14; }
        .stat-card.danger .number { color: #f5222d; }
        .stat-card.success .number { color: #52c41a; }
        .filter-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { background: #fafafa; font-weight: 600; color: #333; }
        tr:hover { background: #fafafa; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .tag-normal { background: #f6ffed; color: #52c41a; }
        .tag-warning { background: #fffbe6; color: #faad14; }
        .tag-danger { background: #fff1f0; color: #f5222d; }
        .tag-info { background: #e6f7ff; color: #1890ff; }
        .btn { padding: 6px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; margin-right: 8px; }
        .btn-primary { background: #1890ff; color: #fff; }
        .btn-danger { background: #f5222d; color: #fff; }
        .btn-default { background: #fff; border: 1px solid #d9d9d9; color: #333; }
        .btn:hover { opacity: 0.8; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; color: #333; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px; }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: #fff; border-radius: 8px; padding: 24px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #f0f0f0; }
        .modal-header h3 { font-size: 18px; }
        .modal-close { cursor: pointer; font-size: 20px; color: #999; }
        .modal-footer { text-align: right; margin-top: 20px; padding-top: 12px; border-top: 1px solid #f0f0f0; }
        .reminder-list { list-style: none; }
        .reminder-list li { padding: 12px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .reminder-list li:last-child { border-bottom: none; }
        .reminder-date { color: #f5222d; font-size: 12px; }
        .charts-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .chart-wrapper { width: 100%; overflow: hidden; }
        @media (max-width: 768px) {
            .charts-container { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .sidebar { width: 180px; }
        }
        .photo-preview { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; }
        .photo-gallery { display: flex; gap: 8px; flex-wrap: wrap; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="app.js"></script>
</body>
</html>
